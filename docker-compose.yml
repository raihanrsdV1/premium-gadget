# ============================================================
# BASE compose = PRODUCTION config (backend + postgres).
#   - backend runs `npm start` from the baked image (no source bind-mount)
#   - postgres is bound to localhost only (not exposed to the internet)
#
# Local development overrides live in docker-compose.override.yml, which Docker
# Compose auto-merges on a plain `docker compose up` (adds hot-reload + the Vite
# app). In production / CI, deploy with ONLY this file:
#     docker compose -f docker-compose.yml up -d
# (the deploy script does exactly that).
# ============================================================
services:
  # ─── PostgreSQL ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pg_premium_gadget
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-premium_gadget}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-PremiumGadget2024!}
      POSTGRES_DB: ${POSTGRES_DB:-premium_gadget}
    ports:
      # localhost-only — DB is reachable on the droplet host (for admin tools)
      # but NOT from the internet. The backend reaches it via the compose
      # network as postgres:5432 regardless.
      - '127.0.0.1:5433:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-premium_gadget}']
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Express Backend ─────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: premium-gadget-backend
    container_name: api_premium_gadget
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-premium_gadget}:${POSTGRES_PASSWORD:-PremiumGadget2024!}@postgres:5432/${POSTGRES_DB:-premium_gadget}
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production_2024}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      SSLCOMMERZ_STORE_ID: ${SSLCOMMERZ_STORE_ID:-dummy}
      SSLCOMMERZ_STORE_PASSWORD: ${SSLCOMMERZ_STORE_PASSWORD:-dummy}
      SSLCOMMERZ_IS_SANDBOX: ${SSLCOMMERZ_IS_SANDBOX:-true}
      # Public URLs for SSLCommerz callbacks + post-payment redirect.
      SERVER_PUBLIC_URL: ${SERVER_PUBLIC_URL:-http://localhost:5001/api/v1}
      STOREFRONT_URL: ${STOREFRONT_URL:-http://localhost:3000}
    command: npm start
    ports:
      - '5001:5000'

volumes:
  pg_data:
