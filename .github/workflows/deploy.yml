name: Deploy backend to droplet

# Auto-deploy the backend whenever main changes (only for paths that affect the
# backend deployment). Also runnable manually from the Actions tab.
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - 'deploy/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# Never run two production deploys at once.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd ~/premium-gadget
            git fetch origin main
            git reset --hard origin/main        # match main exactly (.env is gitignored, untouched)
            bash deploy/deploy.sh
